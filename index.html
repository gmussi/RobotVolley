<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Robot Volley</title>
</head>
<body>
  <div id="stage">
    <div id="wrap">
      <canvas id="game"></canvas>
      <button id="fsBtn" type="button" aria-label="Toggle fullscreen" aria-pressed="false" title="Fullscreen">
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
          <path fill="currentColor" d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
        </svg>
      </button>
    </div>
  </div>
  <div id="hint">
    <div><span class="tag-p1"><b>PLAYER 1</b></span> &nbsp; <span class="kbd">A</span><span class="kbd">D</span> move &nbsp; <span class="kbd">W</span> jump &nbsp; hold <span class="kbd">S</span> serve</div>
    <div id="p2hint"><span class="tag-p2"><b>PLAYER 2</b></span> &nbsp; <span class="kbd">&larr;</span><span class="kbd">&rarr;</span> move &nbsp; <span class="kbd">&uarr;</span> jump &nbsp; hold <span class="kbd">&darr;</span> serve</div>
    <div>Hold serve to charge force &nbsp;·&nbsp; <span class="kbd">Space</span> restart</div>
  </div>
  <div id="colorPanel">
    <div class="colorGroup">
      <span class="tag-p1"><b>P1</b></span>
      <label>Head <input type="color" id="p1-head"></label>
      <label>Torso <input type="color" id="p1-torso"></label>
      <label>Arms <input type="color" id="p1-arms"></label>
      <label>Legs <input type="color" id="p1-legs"></label>
    </div>
    <div class="colorGroup">
      <span class="tag-p2"><b>P2</b></span>
      <label>Head <input type="color" id="p2-head"></label>
      <label>Torso <input type="color" id="p2-torso"></label>
      <label>Arms <input type="color" id="p2-arms"></label>
      <label>Legs <input type="color" id="p2-legs"></label>
    </div>
  </div>
  <div id="legPanel">
    <div class="legGroup p1" data-player="0">
      <span class="tag-p1"><b>P1 Legs</b></span>
      <button class="legBtn active" data-type="normal" title="Normal jump">Robot</button>
      <button class="legBtn" data-type="power" title="Jump higher">Power</button>
      <button class="legBtn" data-type="rocket" title="Many small jumps — tap repeatedly, like Flappy Bird">Rocket</button>
    </div>
    <div class="legGroup p2" data-player="1">
      <span class="tag-p2"><b>P2 Legs</b></span>
      <button class="legBtn active" data-type="normal" title="Normal jump">Robot</button>
      <button class="legBtn" data-type="power" title="Jump higher">Power</button>
      <button class="legBtn" data-type="rocket" title="Many small jumps — tap repeatedly, like Flappy Bird">Rocket</button>
    </div>
  </div>
  <div id="headPanel">
    <div class="headGroup p1" data-player="0">
      <span class="tag-p1"><b>P1 Head</b></span>
      <button class="headBtn active" data-type="standard" title="Balanced bounce">Standard</button>
      <button class="headBtn" data-type="dome" title="High pop, less control">Dome</button>
      <button class="headBtn" data-type="magnet" title="Sticky carry then sling">Magnet</button>
      <button class="headBtn" data-type="drill" title="Dash shove bonus">Drill</button>
      <button class="headBtn" data-type="satellite" title="Tall reach, soft chest">Satellite</button>
    </div>
    <div class="headGroup p2" data-player="1">
      <span class="tag-p2"><b>P2 Head</b></span>
      <button class="headBtn active" data-type="standard" title="Balanced bounce">Standard</button>
      <button class="headBtn" data-type="dome" title="High pop, less control">Dome</button>
      <button class="headBtn" data-type="magnet" title="Sticky carry then sling">Magnet</button>
      <button class="headBtn" data-type="drill" title="Dash shove bonus">Drill</button>
      <button class="headBtn" data-type="satellite" title="Tall reach, soft chest">Satellite</button>
    </div>
  </div>
  <div id="torsoPanel">
    <div class="torsoGroup p1" data-player="0">
      <span class="tag-p1"><b>P1 Torso</b></span>
      <button class="torsoBtn active" data-type="standard" title="Balanced mobility">Standard</button>
      <button class="torsoBtn" data-type="heavy" title="Tanky on ground, sluggish in air">Heavy</button>
      <button class="torsoBtn" data-type="light" title="Floaty and agile in air">Light</button>
      <button class="torsoBtn" data-type="lowCoG" title="Stable, lower center with spinning counterweight">Low CoG</button>
    </div>
    <div class="torsoGroup p2" data-player="1">
      <span class="tag-p2"><b>P2 Torso</b></span>
      <button class="torsoBtn active" data-type="standard" title="Balanced mobility">Standard</button>
      <button class="torsoBtn" data-type="heavy" title="Tanky on ground, sluggish in air">Heavy</button>
      <button class="torsoBtn" data-type="light" title="Floaty and agile in air">Light</button>
      <button class="torsoBtn" data-type="lowCoG" title="Stable, lower center with spinning counterweight">Low CoG</button>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
