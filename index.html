<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0e1a">
  <meta name="description" content="Robot Volley — rally, customize, and smash in a neon sci-fi volleyball arena. 1v1 arcade sports for browser and mobile.">
  <meta property="og:title" content="Robot Volley">
  <meta property="og:description" content="Rally. Customize. Smash. A neon sci-fi volleyball game for two players.">
  <meta property="og:image" content="/og-image.png">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Robot Volley">
  <meta name="twitter:description" content="Rally. Customize. Smash.">
  <meta name="twitter:image" content="/og-image.png">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" href="/favicon-32.png" type="image/png" sizes="32x32">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
  <title>Robot Volley</title>
</head>
<body>
  <div id="splash" aria-hidden="true">
    <div id="splashLogo">ROBOT VOLLEY</div>
    <div id="splashBar"><div id="splashFill"></div></div>
  </div>
  <div id="stage">
    <div id="wrap">
      <canvas id="game"></canvas>
      <button id="fsBtn" type="button" aria-label="Toggle fullscreen" aria-pressed="false" title="Fullscreen">
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
          <path fill="currentColor" d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
        </svg>
      </button>
    </div>
  </div>
  <div id="hint">
    <div><span class="tag-p1"><b>PLAYER 1</b></span> &nbsp; <span class="kbd">A</span><span class="kbd">D</span> move &nbsp; <span class="kbd">W</span> jump &nbsp; hold <span class="kbd">S</span> serve &nbsp; <span class="kbd">F</span> attack</div>
    <div id="p2hint"><span class="tag-p2"><b>PLAYER 2</b></span> &nbsp; <span class="kbd">&larr;</span><span class="kbd">&rarr;</span> move &nbsp; <span class="kbd">&uarr;</span> jump &nbsp; hold <span class="kbd">&darr;</span> serve &nbsp; <span class="kbd">/</span> attack</div>
    <div>Hold serve to charge force &nbsp;·&nbsp; <span class="kbd">Space</span> restart</div>
  </div>
  <div id="customizePanel" class="neon-panel hidden">
    <div class="panel-header">
      <span class="panel-title">ROBOT LAB</span>
      <button id="labClose" type="button" class="neon-btn small" aria-label="Close">✕</button>
    </div>
    <div id="labContent"></div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
