  <g fill="#fff" opacity="0.35">
    <circle cx="120" cy="80" r="1.2"/><circle cx="340" cy="45" r="1"/><circle cx="780" cy="110" r="1.4"/>
    <circle cx="620" cy="60" r="0.9"/><circle cx="900" cy="90" r="1.1"/><circle cx="480" cy="130" r="0.8"/>
