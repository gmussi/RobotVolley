<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" aria-hidden="true">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d1430"/>
      <stop offset="1" stop-color="#151d3d"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a2f45"/>
      <stop offset="1" stop-color="#171a29"/>
    </linearGradient>
    <radialGradient id="glowL" cx="25%" cy="20%" r="50%">
      <stop offset="0" stop-color="#ff5a5f" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#ff5a5f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowR" cx="75%" cy="20%" r="50%">
      <stop offset="0" stop-color="#29b6f6" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#29b6f6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1000" height="560" fill="url(#sky)"/>
  <rect width="1000" height="560" fill="url(#glowL)"/>
  <rect width="1000" height="560" fill="url(#glowR)"/>
  <g stroke="rgba(255,255,255,0.04)" stroke-width="1">
    <line x1="0" y1="0" x2="0" y2="560"/><line x1="50" y1="0" x2="50" y2="560"/><line x1="100" y1="0" x2="100" y2="560"/><line x1="150" y1="0" x2="150" y2="560"/><line x1="200" y1="0" x2="200" y2="560"/><line x1="250" y1="0" x2="250" y2="560"/><line x1="300" y1="0" x2="300" y2="560"/><line x1="350" y1="0" x2="350" y2="560"/><line x1="400" y1="0" x2="400" y2="560"/><line x1="450" y1="0" x2="450" y2="560"/><line x1="500" y1="0" x2="500" y2="560"/><line x1="550" y1="0" x2="550" y2="560"/><line x1="600" y1="0" x2="600" y2="560"/><line x1="650" y1="0" x2="650" y2="560"/><line x1="700" y1="0" x2="700" y2="560"/><line x1="750" y1="0" x2="750" y2="560"/><line x1="800" y1="0" x2="800" y2="560"/><line x1="850" y1="0" x2="850" y2="560"/><line x1="900" y1="0" x2="900" y2="560"/><line x1="950" y1="0" x2="950" y2="560"/>
  </g>
  <rect y="560" width="1000" height="40" fill="url(#floor)"/>
  <rect y="560" width="1000" height="3" fill="rgba(255,255,255,0.08)"/>
